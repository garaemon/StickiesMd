<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Sticky note body gradient (classic yellow) -->
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFBD8"/>
      <stop offset="1" stop-color="#FFF08A"/>
    </linearGradient>
    <!-- Folded corner shading -->
    <linearGradient id="fold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F4D96B"/>
      <stop offset="1" stop-color="#E9C74B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Sticky note with a peeled bottom-right corner -->
  <g filter="url(#shadow)">
    <!-- Main body: rounded top-left, square-ish, missing bottom-right (fold) -->
    <path d="M96 84
             h288
             a28 28 0 0 1 28 28
             v212
             l-92 92
             h-224
             a28 28 0 0 1 -28 -28
             v-276
             a28 28 0 0 1 28 -28 z"
          fill="url(#paper)"/>
    <!-- The folded-up corner -->
    <path d="M320 416
             v-64
             a28 28 0 0 1 28 -28
             h64 z"
          fill="url(#fold)"/>
  </g>

  <!-- "md" wordmark -->
  <g fill="#3A3A2A" font-family="Menlo, Consolas, 'DejaVu Sans Mono', monospace" font-weight="700">
    <text x="256" y="292" font-size="150" text-anchor="middle" letter-spacing="-6">md</text>
  </g>

  <!-- Subtle top ruled lines to evoke a note -->
  <g stroke="#EAD46A" stroke-width="6" stroke-linecap="round" opacity="0.7">
    <line x1="132" y1="150" x2="376" y2="150"/>
  </g>
</svg>
