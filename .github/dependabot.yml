# Dependabot configuration
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Security updates (vulnerability-driven PRs) are enabled separately in
# Settings -> Code security -> "Dependabot security updates". Once enabled,
# Dependabot opens PRs to bump vulnerable dependencies automatically and
# honors the assignees/labels configured below.

version: 2
updates:
  # npm dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    assignees:
      - 'garaemon'
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'chore'
      include: 'scope'

  # GitHub Actions used in workflows
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    assignees:
      - 'garaemon'
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: 'ci'
